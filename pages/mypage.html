<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 | Seoul Grand Hotel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">

  <style>
    :root { --accent:#866552; --black:#111; --white:#fff; --sub:#767676; --line:#E8E8E8; --bg:#F7F7F7; }
    body { font-family:'Pretendard','Montserrat',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }

    .page-header { background:var(--black); padding:20px 40px; display:flex; align-items:center; justify-content:space-between; }
    .page-header__logo img { height:32px; }
    .page-header__nav { display:flex; align-items:center; gap:24px; }
    .page-header__nav a { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#fff; text-decoration:none; opacity:.7; transition:opacity .2s; }
    .page-header__nav a:hover { opacity:1; }

    .mypage-wrap { flex:1; display:grid; grid-template-columns:240px 1fr; gap:32px; max-width:1100px; margin:0 auto; padding:48px 24px 80px; width:100%; box-sizing:border-box; }

    /* Sidebar */
    .sidebar { background:var(--white); padding:32px 24px; box-shadow:0 2px 16px rgba(0,0,0,.06); align-self:start; position:sticky; top:24px; }
    .sidebar__avatar { width:72px; height:72px; background:#E8E8E8; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px; color:#aaa; }
    .sidebar__name { text-align:center; font-weight:700; font-size:17px; color:var(--black); margin-bottom:4px; }
    .sidebar__grade { text-align:center; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; }
    .sidebar__points { background:var(--bg); padding:12px 16px; text-align:center; margin-bottom:24px; }
    .sidebar__points-label { font-size:11px; color:var(--sub); margin-bottom:4px; }
    .sidebar__points-val { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:700; color:var(--black); }

    .sidebar__menu { list-style:none; }
    .sidebar__menu li { border-bottom:1px solid var(--line); }
    .sidebar__menu li:last-child { border:none; }
    .sidebar__menu a { display:block; padding:13px 8px; font-size:14px; color:var(--sub); text-decoration:none; transition:color .2s; cursor:pointer; }
    .sidebar__menu a:hover, .sidebar__menu a.active { color:var(--black); font-weight:600; }
    .sidebar__logout { margin-top:24px; width:100%; padding:12px; background:transparent; border:1px solid var(--line); color:var(--sub); font-size:13px; cursor:pointer; transition:all .2s; }
    .sidebar__logout:hover { border-color:var(--black); color:var(--black); }

    /* Content */
    .content { }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .panel-title { font-family:'Montserrat',sans-serif; font-size:18px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--black); margin-bottom:24px; padding-bottom:16px; border-bottom:2px solid var(--black); }

    /* 예약 카드 */
    .rsv-list { display:flex; flex-direction:column; gap:16px; }
    .rsv-card { background:var(--white); padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.05); }
    .rsv-card__header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .rsv-no { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; color:var(--black); }
    .rsv-badge { display:inline-block; padding:4px 10px; font-family:'Montserrat',sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; border-radius:2px; }
    .rsv-badge.confirmed  { background:#E8F4FD; color:#2980b9; }
    .rsv-badge.pending    { background:#FEF9E7; color:#d4ac0d; }
    .rsv-badge.cancelled  { background:#FDECEA; color:#c0392b; }
    .rsv-badge.completed  { background:#EAFAF1; color:#1b7a4c; }
    .rsv-card__body { display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; }
    .rsv-info { font-size:13px; color:var(--sub); }
    .rsv-info strong { color:var(--black); font-weight:600; }
    .rsv-card__footer { margin-top:16px; display:flex; gap:10px; justify-content:flex-end; }
    .btn-cancel { padding:8px 18px; background:transparent; border:1px solid #c0392b; color:#c0392b; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
    .btn-cancel:hover { background:#c0392b; color:#fff; }

    /* 프로필 편집 */
    .profile-form { background:var(--white); padding:32px; box-shadow:0 2px 12px rgba(0,0,0,.05); }
    .form-group { margin-bottom:20px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-label { display:block; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--black); margin-bottom:8px; }
    .form-input { display:block; width:100%; padding:12px 14px; font-family:'Pretendard',sans-serif; font-size:14px; color:var(--black); background:#fff; border:1px solid var(--line); outline:none; transition:border-color .2s; box-sizing:border-box; }
    .form-input:focus { border-color:var(--black); }
    .form-input[readonly] { background:var(--bg); color:var(--sub); }
    .btn-save { padding:13px 32px; background:var(--black); color:#fff; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; border:1.5px solid var(--black); cursor:pointer; transition:all .2s; }
    .btn-save:hover { background:transparent; color:var(--black); }

    .alert-box { padding:12px 16px; font-size:13px; border-radius:2px; margin-bottom:20px; }
    .alert-box.error   { background:#fff0f0; border:1px solid #f5c6cb; color:#c0392b; }
    .alert-box.success { background:#f0fff4; border:1px solid #b2dfdb; color:#1b7a4c; }

    .empty-state { text-align:center; padding:60px 24px; color:var(--sub); }
    .empty-state p { font-size:15px; margin-bottom:16px; }
    .btn-link { display:inline-block; padding:12px 28px; background:var(--black); color:#fff; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; text-decoration:none; transition:opacity .2s; }
    .btn-link:hover { opacity:.8; }

    @media (max-width:800px) {
      .mypage-wrap { grid-template-columns:1fr; }
      .sidebar { position:static; }
      .rsv-card__body { grid-template-columns:1fr; }
      .form-row { grid-template-columns:1fr; }
    }
    @media (max-width:480px) {
      .page-header { padding:16px 20px; }
      .mypage-wrap { padding:24px 16px 60px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="../index.html" class="page-header__logo">
      <img src="../images/logo_white.png" alt="Seoul Grand Hotel">
    </a>
    <nav class="page-header__nav">
      <a href="../index.html">홈</a>
      <a href="rooms.html">객실</a>
    </nav>
  </header>

  <main class="mypage-wrap">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar__avatar">👤</div>
      <div class="sidebar__name" id="sidebarName">로딩 중...</div>
      <div class="sidebar__grade" id="sidebarGrade">—</div>
      <div class="sidebar__points">
        <div class="sidebar__points-label">보유 포인트</div>
        <div class="sidebar__points-val" id="sidebarPoints">0 P</div>
      </div>
      <ul class="sidebar__menu">
        <li><a class="active" data-tab="reservations" onclick="switchTab(this,'reservations')">예약 내역</a></li>
        <li><a data-tab="profile" onclick="switchTab(this,'profile')">프로필 수정</a></li>
        <li><a data-tab="password" onclick="switchTab(this,'password')">비밀번호 변경</a></li>
      </ul>
      <button class="sidebar__logout" id="logoutBtn">로그아웃</button>
    </aside>

    <!-- 콘텐츠 -->
    <section class="content">

      <!-- 예약 내역 -->
      <div class="tab-panel active" id="tab-reservations">
        <h2 class="panel-title">My Reservations</h2>
        <div id="rsvAlert"></div>
        <div class="rsv-list" id="rsvList">
          <div class="empty-state"><p>로딩 중...</p></div>
        </div>
      </div>

      <!-- 프로필 수정 -->
      <div class="tab-panel" id="tab-profile">
        <h2 class="panel-title">Profile</h2>
        <div id="profileAlert"></div>
        <div class="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">아이디</label>
              <input type="text" class="form-input" id="fUsername" readonly>
            </div>
            <div class="form-group">
              <label class="form-label">이메일</label>
              <input type="email" class="form-input" id="fEmail" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">한글 이름</label>
              <input type="text" class="form-input" id="fNameKo" placeholder="홍길동">
            </div>
            <div class="form-group">
              <label class="form-label">영문 이름</label>
              <input type="text" class="form-input" id="fNameEn" placeholder="HONG GIL DONG">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">휴대폰</label>
              <input type="tel" class="form-input" id="fPhone" placeholder="010-0000-0000">
            </div>
            <div class="form-group">
              <label class="form-label">생년월일</label>
              <input type="date" class="form-input" id="fBirth">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">주소</label>
            <input type="text" class="form-input" id="fAddress" placeholder="주소">
          </div>
          <button class="btn-save" id="btnSaveProfile">저장</button>
        </div>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="tab-panel" id="tab-password">
        <h2 class="panel-title">Change Password</h2>
        <div id="pwAlert"></div>
        <div class="profile-form">
          <div class="form-group">
            <label class="form-label">새 비밀번호</label>
            <input type="password" class="form-input" id="newPw" placeholder="영문+숫자+특수문자 8자 이상">
          </div>
          <div class="form-group">
            <label class="form-label">새 비밀번호 확인</label>
            <input type="password" class="form-input" id="newPwConfirm" placeholder="비밀번호 재입력">
          </div>
          <button class="btn-save" id="btnChangePw">변경</button>
        </div>
      </div>

    </section>
  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/profile.js"></script>
  <script src="../js/reservation.js"></script>

  <script>
  /* ── 탭 전환 ── */
  function switchTab(el, tabId) {
    document.querySelectorAll('.sidebar__menu a').forEach(function (a) { a.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
  }

  (function () {
    var STATUS_KO = { pending:'대기중', confirmed:'확정', cancelled:'취소됨', completed:'완료' };
    var currentUserId = null;

    /* ── 인증 가드 ── */
    async function init() {
      if (!window.SGH || !window.SGH.auth) {
        window.location.href = 'login.html';
        return;
      }
      var ok = await window.SGH.auth.requireLogin();
      if (!ok) return;

      /* 프로필 로드 */
      var profRes = await window.SGH.profile.getCurrent();
      if (profRes.data) {
        currentUserId = profRes.data.id;
        renderSidebar(profRes.data);
        fillProfileForm(profRes.data);
      }

      /* 예약 목록 로드 */
      loadReservations();
    }

    function renderSidebar(p) {
      document.getElementById('sidebarName').textContent = (p.name_ko || p.username || '회원') + ' 님';
      var grade = p.membership_grades && p.membership_grades.name ? p.membership_grades.name : '일반';
      document.getElementById('sidebarGrade').textContent = grade;
      document.getElementById('sidebarPoints').textContent = Number(p.points || 0).toLocaleString() + ' P';
    }

    function fillProfileForm(p) {
      document.getElementById('fUsername').value = p.username || '';
      document.getElementById('fEmail').value    = p.email    || '';
      document.getElementById('fNameKo').value   = p.name_ko  || '';
      document.getElementById('fNameEn').value   = p.name_en  || '';
      document.getElementById('fPhone').value    = p.phone    || '';
      document.getElementById('fBirth').value    = p.birth_date || '';
      document.getElementById('fAddress').value  = p.address  || '';
    }

    /* ── 예약 목록 ── */
    async function loadReservations() {
      var res = await window.SGH.reservation.getByUser();
      var list = document.getElementById('rsvList');

      if (res.error || !res.data || res.data.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>예약 내역이 없습니다.</p>' +
          '<a href="rooms.html" class="btn-link">객실 예약하기</a></div>';
        return;
      }

      list.innerHTML = res.data.map(function (rsv) {
        var guest = rsv.reservation_guests && rsv.reservation_guests[0];
        var roomInfo = '';
        if (rsv.reservation_rooms && rsv.reservation_rooms.length > 0) {
          roomInfo = rsv.reservation_rooms.map(function (rr) {
            return rr.rooms ? rr.rooms.name_ko : '';
          }).filter(Boolean).join(', ');
        }
        var canCancel = rsv.status === 'pending' || rsv.status === 'confirmed';
        return '<div class="rsv-card">' +
          '<div class="rsv-card__header">' +
          '<span class="rsv-no">' + (rsv.reservation_no || rsv.id.slice(0, 8).toUpperCase()) + '</span>' +
          '<span class="rsv-badge ' + rsv.status + '">' + (STATUS_KO[rsv.status] || rsv.status) + '</span>' +
          '</div>' +
          '<div class="rsv-card__body">' +
          '<div class="rsv-info"><strong>체크인</strong> ' + (rsv.check_in || '—') + '</div>' +
          '<div class="rsv-info"><strong>체크아웃</strong> ' + (rsv.check_out || '—') + '</div>' +
          '<div class="rsv-info"><strong>객실</strong> ' + (roomInfo || '—') + '</div>' +
          '<div class="rsv-info"><strong>인원</strong> 성인 ' + rsv.num_adults + '명' + (rsv.num_children ? ' / 어린이 ' + rsv.num_children + '명' : '') + '</div>' +
          '<div class="rsv-info"><strong>금액</strong> ₩' + Number(rsv.price_total || 0).toLocaleString() + '</div>' +
          (guest ? '<div class="rsv-info"><strong>예약자</strong> ' + (guest.name_ko || '—') + '</div>' : '') +
          '</div>' +
          '<div class="rsv-card__footer">' +
          (canCancel ? '<button class="btn-cancel" onclick="cancelRsv(\'' + rsv.id + '\', this)">예약 취소</button>' : '') +
          '</div>' +
          '</div>';
      }).join('');
    }

    /* ── 예약 취소 ── */
    window.cancelRsv = async function (id, btn) {
      if (!confirm('예약을 취소하시겠습니까?\n취소 후 복구가 불가능합니다.')) return;
      btn.disabled = true;
      var res = await window.SGH.reservation.cancel(id);
      if (res.error) {
        alert('취소 중 오류가 발생했습니다: ' + (res.error.message || res.error));
        btn.disabled = false;
        return;
      }
      loadReservations();
    };

    /* ── 프로필 저장 ── */
    document.getElementById('btnSaveProfile').addEventListener('click', async function () {
      if (!currentUserId) return;
      var btn = this;
      btn.disabled = true;
      btn.textContent = '저장 중...';

      var res = await window.SGH.profile.update(currentUserId, {
        name_ko:    document.getElementById('fNameKo').value.trim(),
        name_en:    document.getElementById('fNameEn').value.trim().toUpperCase(),
        phone:      document.getElementById('fPhone').value.trim(),
        birth_date: document.getElementById('fBirth').value || null,
        address:    document.getElementById('fAddress').value.trim() || null,
      });

      var alertEl = document.getElementById('profileAlert');
      if (res.error) {
        alertEl.className = 'alert-box error';
        alertEl.textContent = '저장 실패: ' + (res.error.message || '');
      } else {
        alertEl.className = 'alert-box success';
        alertEl.textContent = '프로필이 저장되었습니다.';
        if (res.data) renderSidebar(res.data);
      }

      btn.disabled = false; btn.textContent = '저장';
      setTimeout(function () { alertEl.className = ''; alertEl.textContent = ''; }, 4000);
    });

    /* ── 비밀번호 변경 ── */
    document.getElementById('btnChangePw').addEventListener('click', async function () {
      var pw  = document.getElementById('newPw').value;
      var pw2 = document.getElementById('newPwConfirm').value;
      var alertEl = document.getElementById('pwAlert');

      if (!pw || pw.length < 8) {
        alertEl.className = 'alert-box error'; alertEl.textContent = '8자 이상 입력해주세요.'; return;
      }
      if (pw !== pw2) {
        alertEl.className = 'alert-box error'; alertEl.textContent = '비밀번호가 일치하지 않습니다.'; return;
      }

      this.disabled = true;
      var res = await window.SGH.auth.updatePassword(pw);
      if (res.error) {
        alertEl.className = 'alert-box error'; alertEl.textContent = '변경 실패: ' + res.error.message;
      } else {
        alertEl.className = 'alert-box success'; alertEl.textContent = '비밀번호가 변경되었습니다.';
        document.getElementById('newPw').value = '';
        document.getElementById('newPwConfirm').value = '';
      }
      this.disabled = false;
    });

    /* ── 로그아웃 ── */
    document.getElementById('logoutBtn').addEventListener('click', async function () {
      await window.SGH.auth.signOut();
      window.location.href = '../index.html';
    });

    init();
  })();
  </script>

</body>
</html>
