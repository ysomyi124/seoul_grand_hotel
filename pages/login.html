<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>вАюЖиИВЮИ | Seoul Grand Hotel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">

  <style>
    body { font-family:'Pretendard','Montserrat',sans-serif; background:#F7F7F7; display:flex; flex-direction:column; min-height:100vh; }
    .page-header { background:#111; padding:20px 40px; display:flex; align-items:center; justify-content:space-between; }
    .page-header__logo img { height:32px; }
    .page-header__nav a { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#fff; text-decoration:none; opacity:.7; transition:opacity .2s; }
    .page-header__nav a:hover { opacity:1; }

    .login-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:80px 24px; }
    .login-box { width:100%; max-width:460px; background:#fff; padding:56px 48px 48px; box-shadow:0 4px 32px rgba(0,0,0,.07); }
    .login-box__title { font-family:'Montserrat',sans-serif; font-size:24px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#111; margin-bottom:8px; }
    .login-box__sub { font-size:14px; color:#767676; margin-bottom:40px; }

    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#111; margin-bottom:8px; }
    .form-input { display:block; width:100%; padding:14px 16px; font-family:'Pretendard',sans-serif; font-size:15px; color:#111; background:#fff; border:1px solid #E8E8E8; outline:none; transition:border-color .2s; box-sizing:border-box; }
    .form-input:focus { border-color:#111; }
    .form-input::placeholder { color:#bbb; }
    .form-group.has-error .form-input { border-color:#c0392b; }
    .form-error { display:none; font-size:12px; color:#c0392b; margin-top:6px; }
    .form-group.has-error .form-error { display:block; }

    .form-check { display:flex; align-items:center; gap:8px; margin-bottom:28px; }
    .form-check input { width:16px; height:16px; accent-color:#111; cursor:pointer; }
    .form-check label { font-size:13px; color:#555; cursor:pointer; }

    .btn-login { display:block; width:100%; padding:16px; background:#111; color:#fff; font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; border:1.5px solid #111; cursor:pointer; transition:background .2s,color .2s; margin-bottom:24px; }
    .btn-login:hover { background:transparent; color:#111; }
    .btn-login:disabled { opacity:.5; cursor:not-allowed; }

    .alert-box { display:none; padding:14px 16px; font-size:13px; border-radius:3px; margin-bottom:20px; }
    .alert-box.error { background:#fff0f0; border:1px solid #f5c6cb; color:#c0392b; }
    .alert-box.success { background:#f0fff4; border:1px solid #b2dfdb; color:#1b7a4c; }

    .login-links { display:flex; align-items:center; justify-content:center; gap:20px; }
    .login-links a { font-size:13px; color:#767676; transition:color .2s; text-decoration:none; }
    .login-links a:hover { color:#111; }
    .login-links__divider { width:1px; height:12px; background:#E8E8E8; }

    .page-footer { padding:24px 40px; text-align:center; border-top:1px solid #E8E8E8; }
    .page-footer p { font-family:'Montserrat',sans-serif; font-size:11px; color:#aaa; letter-spacing:.08em; }

    @media (max-width:480px) { .login-box { padding:40px 28px 36px; } }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="../index.html" class="page-header__logo">
      <img src="../images/logo_white.png" alt="Seoul Grand Hotel">
    </a>
    <nav class="page-header__nav">
      <a href="register.html">ьџїВЏљЖ░ђВъЁ</a>
    </nav>
  </header>

  <main class="login-wrap">
    <div class="login-box">
      <h1 class="login-box__title">Login</h1>
      <p class="login-box__sub">ВёюВџИ ЖиИвъювЊю ьўИьЁћВЌљ ВўцВІа Ж▓ЃВЮё ьЎўВўЂьЋЕвІѕвІц.</p>

      <div class="alert-box" id="alertBox"></div>

      <form id="loginForm" novalidate>

        <div class="form-group" id="groupEmail">
          <label class="form-label" for="userEmail">ВЮ┤вЕћВЮ╝</label>
          <input type="email" class="form-input" id="userEmail" name="email"
                 placeholder="example@email.com" autocomplete="email">
          <span class="form-error" id="errEmail">Вўгв░ћвЦИ ВЮ┤вЕћВЮ╝ВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.</span>
        </div>

        <div class="form-group" id="groupPw">
          <label class="form-label" for="userPw">в╣ёв░ђв▓ѕьўИ</label>
          <input type="password" class="form-input" id="userPw" name="password"
                 placeholder="в╣ёв░ђв▓ѕьўИвЦ╝ ВъЁваЦьЋўВёИВџћ" autocomplete="current-password">
          <span class="form-error" id="errPw">в╣ёв░ђв▓ѕьўИвЦ╝ ВъЁваЦьЋ┤ВБ╝ВёИВџћ.</span>
        </div>

        <div class="form-check">
          <input type="checkbox" id="saveEmail" name="saveEmail">
          <label for="saveEmail">ВЮ┤вЕћВЮ╝ ВађВъЦ</label>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">вАюЖиИВЮИ</button>

      </form>

      <div class="login-links">
        <a href="register.html">ьџїВЏљЖ░ђВъЁ</a>
        <span class="login-links__divider"></span>
        <a href="#" id="forgotPwLink">в╣ёв░ђв▓ѕьўИ В░ЙЖИ░</a>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    <p>COPYRIGHT 2026 SEOUL GRAND HOTEL ALL RIGHTS RESERVED.</p>
  </footer>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>

  <script>
  (function () {
    var form       = document.getElementById('loginForm');
    var emailInput = document.getElementById('userEmail');
    var pwInput    = document.getElementById('userPw');
    var groupEmail = document.getElementById('groupEmail');
    var groupPw    = document.getElementById('groupPw');
    var loginBtn   = document.getElementById('loginBtn');
    var alertBox   = document.getElementById('alertBox');
    var saveChk    = document.getElementById('saveEmail');

    /* ВађВъЦвљю ВЮ┤вЕћВЮ╝ в│хВЏљ */
    var saved = localStorage.getItem('sgh_saved_email');
    if (saved) { emailInput.value = saved; saveChk.checked = true; }

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className   = 'alert-box ' + (type || 'error');
      alertBox.style.display = 'block';
    }
    function hideAlert() { alertBox.style.display = 'none'; }

    function setFieldError(grp, show) {
      grp.classList.toggle('has-error', show);
    }

    /* в╣ёв░ђв▓ѕьўИ В░ЙЖИ░ */
    document.getElementById('forgotPwLink').addEventListener('click', async function (e) {
      e.preventDefault();
      var email = emailInput.value.trim();
      if (!email) { alert('ВЮ┤вЕћВЮ╝ВЮё ве╝Вађ ВъЁваЦьЋ┤ВБ╝ВёИВџћ.'); return; }
      if (!window.SGH || !window.SGH.auth) { alert('ВЮИВдЮ Вёюв╣ёВіцвЦ╝ ВѓгВџЕьЋа Вѕў ВЌєВіхвІѕвІц.'); return; }
      var res = await window.SGH.auth.resetPassword(email);
      if (res.error) { showAlert('ВўцвЦў: ' + res.error.message); }
      else           { showAlert('в╣ёв░ђв▓ѕьўИ ВъгВёцВаЋ вДЂьЂгвЦ╝ ВЮ┤вЕћВЮ╝вАю в░юВєАьќѕВіхвІѕвІц.', 'success'); }
    });

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideAlert();
      var email = emailInput.value.trim();
      var pw    = pwInput.value;
      var valid = true;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(groupEmail, true); valid = false;
      } else { setFieldError(groupEmail, false); }

      if (!pw) {
        setFieldError(groupPw, true); valid = false;
      } else { setFieldError(groupPw, false); }

      if (!valid) return;

      /* ВЮ┤вЕћВЮ╝ ВађВъЦ */
      if (saveChk.checked) { localStorage.setItem('sgh_saved_email', email); }
      else                  { localStorage.removeItem('sgh_saved_email'); }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'вАюЖиИВЮИ ВцЉ...';

      if (!window.SGH || !window.SGH.auth) {
        showAlert('ВЮИВдЮ Вёюв╣ёВіцвЦ╝ ВѓгВџЕьЋа Вѕў ВЌєВіхвІѕвІц. ВъаВІю ьЏё вІцВІю ВІювЈёьЋ┤ВБ╝ВёИВџћ.');
        loginBtn.disabled = false; loginBtn.textContent = 'вАюЖиИВЮИ';
        return;
      }

      var res = await window.SGH.auth.signIn(email, pw);

      if (res.error) {
        var msg = res.error.message;
        if (msg.includes('Invalid login')) msg = 'ВЮ┤вЕћВЮ╝ вўљвіћ в╣ёв░ђв▓ѕьўИЖ░ђ Вўгв░ћвЦ┤ВДђ ВЋіВіхвІѕвІц.';
        else if (msg.includes('Email not confirmed')) msg = 'ВЮ┤вЕћВЮ╝ ВЮИВдЮВЮё ВЎёвБїьЋ┤ВБ╝ВёИВџћ. ВЮ┤вЕћВЮ╝ВЮё ьЎЋВЮИьЋ┤ВБ╝ВёИВџћ.';
        showAlert(msg);
        loginBtn.disabled = false; loginBtn.textContent = 'вАюЖиИВЮИ';
        return;
      }

      /* вАюЖиИВЮИ Вё▒Ж│х */
      var redirect = sessionStorage.getItem('loginRedirect') || '../index.html';
      sessionStorage.removeItem('loginRedirect');
      window.location.href = redirect;
    });

    emailInput.addEventListener('input', function () { setFieldError(groupEmail, false); hideAlert(); });
    pwInput.addEventListener('input',    function () { setFieldError(groupPw,    false); hideAlert(); });

    /* ВЮ┤в»И вАюЖиИВЮИвљю Ж▓йВџ░ вдгвІцВЮ┤ваЅьіИ */
    if (window.SGH && window.SGH.supabase) {
      window.SGH.supabase.auth.getSession().then(function (res) {
        if (res.data && res.data.session) window.location.href = '../index.html';
      });
    }
  })();
  </script>

</body>
</html>
